<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arab tili testi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--tg-theme-bg-color, #f0f4ff);
    color: var(--tg-theme-text-color, #1a1a2e);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  .header { width: 100%; text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #2c5f8a; }
  .header p { font-size: 13px; color: #888; direction: ltr; margin-top: 6px; }

  .mavzu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 400px;
  }
  .mavzu-btn {
    background: white;
    border: 2px solid #2c5f8a;
    border-radius: 16px;
    padding: 18px 12px;
    font-size: 15px;
    font-weight: 600;
    color: #2c5f8a;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    direction: ltr;
  }
  .mavzu-btn:active { background: #2c5f8a; color: white; transform: scale(0.97); }
  .mavzu-btn .emoji { font-size: 26px; display: block; margin-bottom: 6px; }

  .quiz-screen { width: 100%; max-width: 420px; display: none; flex-direction: column; align-items: center; gap: 16px; }

  .progress-bar-wrap { width: 100%; background: #dde8f5; border-radius: 20px; height: 10px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #2c5f8a, #4a90d9); border-radius: 20px; transition: width 0.4s ease; }
  .progress-text { font-size: 13px; color: #666; direction: ltr; align-self: flex-end; }

  .savol-karta {
    background: white;
    border-radius: 20px;
    padding: 24px 20px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 16px rgba(44,95,138,0.12);
    direction: rtl;
  }
  .savol-karta .arab { font-size: 26px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; line-height: 1.6; }
  .savol-karta .izoh { font-size: 13px; color: #888; direction: ltr; }

  .javoblar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
  .javob-btn {
    background: white;
    border: 2px solid #dde8f5;
    border-radius: 14px;
    padding: 14px 8px;
    font-size: 18px;
    font-weight: 600;
    color: #2c5f8a;
    cursor: pointer;
    transition: all 0.2s;
    direction: rtl;
    text-align: center;
    line-height: 1.5;
  }
  .javob-btn:hover { border-color: #2c5f8a; background: #eef4fb; }
  .javob-btn.togri { background: #d4edda; border-color: #28a745; color: #155724; }
  .javob-btn.xato  { background: #f8d7da; border-color: #dc3545; color: #721c24; }
  .javob-btn:disabled { cursor: not-allowed; opacity: 0.8; }

  .natija-matn {
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    padding: 10px 16px;
    border-radius: 12px;
    direction: rtl;
    display: none;
  }
  .natija-matn.togri { background: #d4edda; color: #155724; }
  .natija-matn.xato  { background: #f8d7da; color: #721c24; }

  .natija-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .natija-doira {
    width: 140px; height: 140px; border-radius: 50%;
    background: linear-gradient(135deg, #2c5f8a, #4a90d9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: white; box-shadow: 0 8px 24px rgba(44,95,138,0.3);
  }
  .natija-doira .ball { font-size: 42px; font-weight: 800; line-height: 1; }
  .natija-doira .jami { font-size: 16px; opacity: 0.85; }
  .natija-xabar { font-size: 20px; font-weight: 700; color: #2c5f8a; direction: rtl; }
  .natija-izoh  { font-size: 14px; color: #666; direction: ltr; }
  .qayta-btn {
    background: linear-gradient(135deg, #2c5f8a, #4a90d9);
    color: white; border: none; border-radius: 16px;
    padding: 14px 40px; font-size: 16px; font-weight: 700;
    cursor: pointer; direction: ltr; transition: transform 0.2s;
  }
  .qayta-btn:active { transform: scale(0.97); }
  .orqaga-btn {
    background: transparent; border: 2px solid #2c5f8a; color: #2c5f8a;
    border-radius: 16px; padding: 12px 30px; font-size: 15px;
    font-weight: 600; cursor: pointer; direction: ltr;
  }
</style>
</head>
<body>

<div id="mavzuScreen">
  <div class="header">
    <h1>🕌 اختبار اللغة العربية</h1>
    <p>Mavzuni tanlang</p>
  </div>
  <div class="mavzu-grid">
    <button class="mavzu-btn" onclick="boshla('Harflar')">
      <span class="emoji">🔤</span>الحروف
    </button>
    <button class="mavzu-btn" onclick="boshla('Mevalar')">
      <span class="emoji">🍎</span>الفواكه والخضار
    </button>
    <button class="mavzu-btn" onclick="boshla('Gaplar')">
      <span class="emoji">💬</span>الجمل
    </button>
    <button class="mavzu-btn" onclick="boshla('Joylashuv')">
      <span class="emoji">📍</span>المكان
    </button>
    <button class="mavzu-btn" onclick="boshla('Felllar')">
      <span class="emoji">🏃</span>الأفعال
    </button>
    <button class="mavzu-btn" onclick="boshla('Kunlar')">
      <span class="emoji">📅</span>أيام الأسبوع
    </button>
  </div>
</div>

<div class="quiz-screen" id="quizScreen">
  <div class="progress-text" id="progressText">1 / 10</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:10%"></div>
  </div>
  <div class="savol-karta">
    <div class="arab" id="savolMatn"></div>
    <div class="izoh" id="savolIzoh"></div>
  </div>
  <div class="javoblar" id="javoblar"></div>
  <div class="natija-matn" id="natijaMtn"></div>
</div>

<div class="natija-screen" id="natijScreen">
  <div class="natija-doira">
    <div class="ball" id="ballMatn">0</div>
    <div class="jami" id="jamiMatn">/ 10</div>
  </div>
  <div class="natija-xabar" id="natijXabar"></div>
  <div class="natija-izoh" id="natijIzoh"></div>
  <button class="qayta-btn" onclick="qaytaBoshla()">🔄 Qayta urinish</button>
  <button class="orqaga-btn" onclick="mavzuTanlash()">← Mavzu tanlash</button>
</div>

<script>
const savollarDB = {
  "Harflar": [
    {s:"مَا هَذَا الحَرْفُ؟ → ب", j:["بَاء","تَاء","سِين","أَلِف"], t:"بَاء"},
    {s:"مَا هَذَا الحَرْفُ؟ → ت", j:["بَاء","تَاء","جِيم","دَال"], t:"تَاء"},
    {s:"مَا هَذَا الحَرْفُ؟ → س", j:["بَاء","تَاء","سِين","هَاء"], t:"سِين"},
    {s:"مَا هَذَا الحَرْفُ؟ → ج", j:["جِيم","هَاء","خَاء","دَال"], t:"جِيم"},
    {s:"مَا هَذَا الحَرْفُ؟ → د", j:["رَاء","زَاي","دَال","وَاو"], t:"دَال"},
    {s:"مَا هَذَا الحَرْفُ؟ → ر", j:["دَال","رَاء","زَاي","سِين"], t:"رَاء"},
    {s:"مَا هَذَا الحَرْفُ؟ → ش", j:["شِين","سِين","صَاد","ضَاد"], t:"شِين"},
    {s:"مَا هَذَا الحَرْفُ؟ → ص", j:["سِين","شِين","صَاد","ضَاد"], t:"صَاد"},
    {s:"مَا هَذَا الحَرْفُ؟ → ع", j:["عَيْن","غَيْن","هَاء","خَاء"], t:"عَيْن"},
    {s:"مَا هَذَا الحَرْفُ؟ → م", j:["نُون","مِيم","وَاو","هَاء"], t:"مِيم"},
  ],
  "Mevalar": [
    {s:"مَا اسْمُ هَذِهِ الخَضْرَاء؟ 🍆", j:["خِيَار","بَاذِنْجَان","طَمَاطِم","فُلْفُل"], t:"بَاذِنْجَان"},
    {s:"مَا اسْمُ هَذِهِ الخَضْرَاء؟ 🥒", j:["خِيَار","لَيْمُون","فُلْفُل","طَمَاطِم"], t:"خِيَار"},
    {s:"مَا اسْمُ هَذِهِ الخَضْرَاء؟ 🍅", j:["تُفَّاح","طَمَاطِم","بَاذِنْجَان","خِيَار"], t:"طَمَاطِم"},
    {s:"مَا اسْمُ هَذِهِ الخَضْرَاء؟ 🌶️", j:["فُلْفُل","خِيَار","لَيْمُون","بَاذِنْجَان"], t:"فُلْفُل"},
    {s:"مَا اسْمُ هَذِهِ الفَاكِهَة؟ 🍎", j:["لَيْمُون","تُفَّاح","طَمَاطِم","فُلْفُل"], t:"تُفَّاح"},
    {s:"مَا اسْمُ هَذِهِ الفَاكِهَة؟ 🍋", j:["لَيْمُون","فُلْفُل","بَاذِنْجَان","تُفَّاح"], t:"لَيْمُون"},
  ],
  "Gaplar": [
    {s:"الأُمُّ تَشْتَرِي ...", i:"Ona ... sotib oladi", j:["بِالنُّقُودِ","بِالحِسَابِ","بِالبَائِعِ","بِالبَيْتِ"], t:"بِالنُّقُودِ"},
    {s:"تَطْبُخُ الأُمُّ ...", i:"Ona ... pishiradi", j:["الخُضَرَ","اللَّيْمُونَ","الفَاكِهَةَ","الخُبْزَ"], t:"الخُضَرَ"},
    {s:"المَانجُو ...", i:"Mango ...", j:["خُضَرٌ","فَاكِهَةٌ","حَلْوَى","شُرْبَة"], t:"فَاكِهَةٌ"},
    {s:"يَزِنُ البَائِعُ ...", i:"Sotuvchi ... tortadi", j:["النُّقُودَ","الحِسَابَ","الفَاكِهَةَ","البَيْتَ"], t:"الفَاكِهَةَ"},
  ],
  "Joylashuv": [
    {s:"أَيْنَ هَانِي؟", i:"Hani qayerda?", j:["في الأَمَامِ","في الخَلْفِ","في الوَسَطِ","في اليَمِينِ"], t:"في الأَمَامِ"},
    {s:"أَيْنَ سَامِي؟", i:"Sami qayerda?", j:["في الأَمَامِ","في الخَلْفِ","في الوَسَطِ","في الشِّمَالِ"], t:"في الخَلْفِ"},
    {s:"أَيْنَ تَامِرٌ؟", i:"Tamir qayerda?", j:["في الوَسَطِ","في الأَمَامِ","في الخَلْفِ","في اليَمِينِ"], t:"في الوَسَطِ"},
    {s:"أَيْنَ الكَلْبُ الكَبِيرُ؟", i:"Katta it qayerda?", j:["في اليَمِينِ","في الشِّمَالِ","في الوَسَطِ","في الأَمَامِ"], t:"في اليَمِينِ"},
    {s:"أَيْنَ الكَلْبُ الصَّغِيرُ؟", i:"Kichik it qayerda?", j:["في الشِّمَالِ","في اليَمِينِ","في الخَلْفِ","في الوَسَطِ"], t:"في الشِّمَالِ"},
  ],
  "Felllar": [
    {s:"هُوَ يَجْرِي → هُمَا ...", i:"U yuguradi → Ikkovi ...", j:["يَجْرِيَانِ","يَجْرُونَ","يَجْرِي","تَجْرِيَانِ"], t:"يَجْرِيَانِ"},
    {s:"هُوَ يَجْرِي → هُمْ ...", i:"U yuguradi → Ular ...", j:["يَجْرُونَ","يَجْرِيَانِ","يَجْرِي","تَجْرُونَ"], t:"يَجْرُونَ"},
    {s:"هُوَ يَلْعَبُ → هُمَا ...", i:"U o'ynaydi → Ikkovi ...", j:["يَلْعَبَانِ","يَلْعَبُونَ","يَلْعَبُ","تَلْعَبَانِ"], t:"يَلْعَبَانِ"},
    {s:"هُوَ يَلْعَبُ → هُمْ ...", i:"U o'ynaydi → Ular ...", j:["يَلْعَبُونَ","يَلْعَبَانِ","يَلْعَبُ","تَلْعَبُونَ"], t:"يَلْعَبُونَ"},
    {s:"هُوَ يَكْتُبُ → هُمَا ...", i:"U yozadi → Ikkovi ...", j:["يَكْتُبَانِ","يَكْتُبُونَ","يَكْتُبُ","تَكْتُبَانِ"], t:"يَكْتُبَانِ"},
    {s:"هُوَ يَكْتُبُ → هُمْ ...", i:"U yozadi → Ular ...", j:["يَكْتُبُونَ","يَكْتُبَانِ","يَكْتُبُ","تَكْتُبُونَ"], t:"يَكْتُبُونَ"},
  ],
  "Kunlar": [
    {s:"مَا هُوَ أَوَّلُ أَيَّامِ الأُسْبُوعِ؟", i:"Haftaning birinchi kuni?", j:["الأَحَد","السَّبْت","الجُمُعَة","الاثْنَيْن"], t:"الأَحَد"},
    {s:"مَا هُوَ اليَوْمُ بَعْدَ الاثْنَيْنِ؟", i:"Dushanba dan keyingi kun?", j:["الثُّلَاثَاء","الأَرْبِعَاء","الأَحَد","الخَمِيس"], t:"الثُّلَاثَاء"},
    {s:"مَا هُوَ آخِرُ أَيَّامِ الأُسْبُوعِ؟", i:"Haftaning oxirgi kuni?", j:["الجُمُعَة","السَّبْت","الخَمِيس","الأَحَد"], t:"الجُمُعَة"},
    {s:"مَا هُوَ اليَوْمُ قَبْلَ الأَرْبِعَاءِ؟", i:"Chorshanba dan oldingi kun?", j:["الثُّلَاثَاء","الخَمِيس","الاثْنَيْن","الجُمُعَة"], t:"الثُّلَاثَاء"},
    {s:"مَا هُوَ اليَوْمُ بَعْدَ الخَمِيسِ؟", i:"Payshanba dan keyingi kun?", j:["الجُمُعَة","السَّبْت","الأَرْبِعَاء","الأَحَد"], t:"الجُمُعَة"},
  ],
};

let joriyMavzu = null;
let savollar = [];
let joriyIndex = 0;
let ball = 0;

const urlParams = new URLSearchParams(window.location.search);
const urlMavzu = urlParams.get('mavzu');
if (urlMavzu && savollarDB[urlMavzu]) boshla(urlMavzu);

function mavzuTanlash() {
  document.getElementById('mavzuScreen').style.display = 'block';
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('natijScreen').style.display = 'none';
}

function boshla(mavzu) {
  joriyMavzu = mavzu;
  savollar = savollarDB[mavzu];
  joriyIndex = 0;
  ball = 0;
  document.getElementById('mavzuScreen').style.display = 'none';
  document.getElementById('natijScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'flex';
  savolKorsat();
}

function savolKorsat() {
  const s = savollar[joriyIndex];
  const jami = savollar.length;
  document.getElementById('progressText').textContent = joriyIndex + 1 + ' / ' + jami;
  document.getElementById('progressBar').style.width = ((joriyIndex + 1) / jami * 100) + '%';
  document.getElementById('savolMatn').textContent = s.s;
  document.getElementById('savolIzoh').textContent = s.i || '';
  document.getElementById('natijaMtn').style.display = 'none';

  const javoblarDiv = document.getElementById('javoblar');
  javoblarDiv.innerHTML = '';
  s.j.forEach(function(j) {
    const btn = document.createElement('button');
    btn.className = 'javob-btn';
    btn.textContent = j;
    btn.onclick = function() { javobTanlash(j, btn); };
    javoblarDiv.appendChild(btn);
  });
}

function javobTanlash(javob, btn) {
  const s = savollar[joriyIndex];
  const barcha = document.querySelectorAll('.javob-btn');
  barcha.forEach(function(b) { b.disabled = true; });

  const natijaMtn = document.getElementById('natijaMtn');
  natijaMtn.style.display = 'block';

  if (javob === s.t) {
    ball++;
    btn.classList.add('togri');
    natijaMtn.textContent = '✅ صَحِيح!';
    natijaMtn.className = 'natija-matn togri';
  } else {
    btn.classList.add('xato');
    natijaMtn.textContent = '❌ خَطَأ! الجَوَابُ الصَّحِيحُ: ' + s.t;
    natijaMtn.className = 'natija-matn xato';
    barcha.forEach(function(b) { if (b.textContent === s.t) b.classList.add('togri'); });
  }

  setTimeout(function() {
    joriyIndex++;
    if (joriyIndex >= savollar.length) {
      natijKorsat();
    } else {
      savolKorsat();
    }
  }, 1400);
}

function natijKorsat() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('natijScreen').style.display = 'flex';
  const jami = savollar.length;
  document.getElementById('ballMatn').textContent = ball;
  document.getElementById('jamiMatn').textContent = '/ ' + jami;
  const foiz = ball / jami;
  let xabar, izoh;
  if (foiz === 1)       { xabar = '🏆 مُمْتَاز!';    izoh = 'Barcha savollar togri!'; }
  else if (foiz >= 0.8) { xabar = '⭐ رَائِع!';       izoh = ball + ' ta togri javob'; }
  else if (foiz >= 0.6) { xabar = '👍 جَيِّد!';       izoh = 'Yana mashq qiling'; }
  else                  { xabar = '💪 حَاوِل مَرَّة أُخْرَى!'; izoh = 'Yana urinib koring'; }
  document.getElementById('natijXabar').textContent = xabar;
  document.getElementById('natijIzoh').textContent = izoh;
}

function qaytaBoshla() { boshla(joriyMavzu); }

if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
